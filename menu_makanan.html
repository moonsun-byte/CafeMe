<style>
body {
    background: url("./img/bg1.avif");
    background-size: cover;
    background-attachment: fixed;
    padding-top: 80px;
}

.navbar {
    background: rgba(255,255,255,0.9);
}

.fade-in {
    animation: slideDown 1s ease;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-50px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

.card img {
    height: 200px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.1);
}

button:hover {
    transform: scale(1.1);
}

.navbar-brand img {
    border-radius: 50%;
}
</style>
</head>
