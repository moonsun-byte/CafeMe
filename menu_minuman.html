<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Minuman</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>
body {
    background: url("./img/bg1.avif");
    background-size: cover;
    background-attachment: fixed;
    padding-top: 80px;
}

.navbar {
    background: rgba(255,255,255,0.9);
}

.fade-in {
    animation: slideDown 1s ease;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-50px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

.card img {
    height: 200px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.1);
}

button:hover {
    transform: scale(1.1);
}

.navbar-brand img {
    border-radius: 50%;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top fade-in">
<div class="container">

    <!-- LOGO + NAMA -->
    <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
        <img src="./img/bg2.jpg" width="40" height="40" class="me-2">
        CafeKu
    </a>

    <div class="ms-auto">
        <a href="menu_makanan.html" class="btn btn-dark btn-sm">Makanan</a>
        <a href="menu_minuman.html" class="btn btn-dark btn-sm">Minuman</a>
    </div>

</div>
</nav>


<div class="container mt-5">

<h2 class="text-center text-white mb-5 fade-in">Menu Minuman</h2>

<div class="row g-4">

<h5>Coffee Milk</h5>

</div>
</div>
</div>
</div>

</div>
</div>
</div>

<!-- CARD 3 -->

</div>
</div>
</div>
</div>

<!-- CARD 4 -->
<div class="col-md-3" data-aos="flip-right">

</div>
</div>

<!-- CARD 5 -->

</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init({ duration: 1000 });

document.querySelectorAll(".btn-success").forEach(btn => {
    btn.onclick = () => alert("Pesanan berhasil ditambahkan!");
});

document.querySelectorAll(".btn-outline-primary").forEach(btn => {
    btn.onclick = () => alert("Terima kasih atas ulasannya!");
});
</script>

</body>
</html>
